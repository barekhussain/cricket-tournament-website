<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Premier League 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background:#f4f7fb;
    color:#333;
}

header{
    background: linear-gradient(135deg, #004aad, #001f3f);
    color:white;
    padding:80px 20px;
    text-align:center;
}

nav{
    background:#111;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 20px;
    text-decoration:none;
}

section{
    padding:60px 10%;
}

.section-title{
    text-align:center;
    margin-bottom:40px;
    font-size:28px;
    font-weight:600;
}

/* Table */

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

table th, table td{
    padding:15px;
    text-align:center;
}

table th{
    background:#004aad;
    color:white;
}

input{
    width:60px;
    padding:5px;
    text-align:center;
}

footer{
    background:#001f3f;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
    <h1>🏏 Local Premier League 2026</h1>
    <p>Organised by Ponchagaon Sports Club</p>
</header>

<nav>
    <a href="#points">Points Table</a>
</nav>

<section id="points">
    <div class="section-title">Auto Calculating Points Table</div>

    <table>
        <tr>
            <th>Team</th>
            <th>Played</th>
            <th>Won</th>
            <th>Lost</th>
            <th>Points</th>
        </tr>

        <tr>
            <td>Ponchagaon</td>
            <td><input type="number" class="played" value="2"></td>
            <td><input type="number" class="won" value="2"></td>
            <td><input type="number" class="lost" value="0"></td>
            <td class="points">4</td>
        </tr>

        <tr>
            <td>Dhantola</td>
            <td><input type="number" class="played" value="2"></td>
            <td><input type="number" class="won" value="1"></td>
            <td><input type="number" class="lost" value="1"></td>
            <td class="points">2</td>
        </tr>

        <tr>
            <td>Boitamari</td>
            <td><input type="number" class="played" value="2"></td>
            <td><input type="number" class="won" value="0"></td>
            <td><input type="number" class="lost" value="2"></td>
            <td class="points">0</td>
        </tr>

    </table>
</section>

<footer>
    © 2026 Local Premier League | Ponchagaon Sports Club
</footer>

<script>

function calculatePoints() {
    const rows = document.querySelectorAll("table tr");

    rows.forEach((row, index) => {
        if(index === 0) return;

        const won = row.querySelector(".won").value;
        const pointsCell = row.querySelector(".points");

        const points = won * 2;
        pointsCell.innerText = points;
    });
}

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", calculatePoints);
});

calculatePoints();

</script>

</body>
</html>
