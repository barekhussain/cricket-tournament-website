<!DOCTYPE html>
<html>
<head>
<title>Local Premier League 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins;margin:0;background:#f4f7fb;}
header{background:#004aad;color:white;padding:50px;text-align:center;}
section{padding:40px 10%;}
table{width:100%;border-collapse:collapse;background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.08);}
th,td{padding:12px;text-align:center;}
th{background:#004aad;color:white;}
</style>
</head>
<body>

<header>
<h1>🏏 Local Premier League 2026</h1>
<p>Organised by Ponchagaon Sports Club</p>
</header>

<section>
<h2>Points Table</h2>
<table id="pointsTable">
<tr>
<th>Team</th>
<th>Played</th>
<th>Won</th>
<th>Lost</th>
<th>Points</th>
</tr>
</table>
</section>

<script>

const sheetID = "YOUR_SHEET_ID";
const pointsURL = `https://docs.google.com/spreadsheets/d/$1571yn2WY7OszOwY5I7X8luHKMDf9BSJerciKzeBuWww/gviz/tq?tqx=out:json&sheet=Points`;

fetch(pointsURL)
.then(res => res.text())
.then(data => {

const json = JSON.parse(data.substring(47).slice(0,-2));
const rows = json.table.rows;

let table = document.getElementById("pointsTable");

rows.forEach(row => {

let team = row.c[0]?.v || "";
let played = row.c[1]?.v || 0;
let won = row.c[2]?.v || 0;
let lost = row.c[3]?.v || 0;
let points = won * 2;

let newRow = `
<tr>
<td>${team}</td>
<td>${played}</td>
<td>${won}</td>
<td>${lost}</td>
<td>${points}</td>
</tr>`;

table.innerHTML += newRow;

});

});

</script>

</body>
</html>
