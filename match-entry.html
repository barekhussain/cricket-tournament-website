<!DOCTYPE html>
<html>
<head>
<title>Match Entry - Local Premier League</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;margin:0;background:#f4f7fb;}
header{background:#004aad;color:white;padding:50px;text-align:center;}
section{padding:50px 10%;}
table{width:100%;border-collapse:collapse;background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.08);}
th,td{padding:12px;text-align:center;}
th{background:#004aad;color:white;}
input{width:80px;padding:6px;text-align:center;}
button{
margin-top:20px;
padding:10px 20px;
background:#004aad;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}
button:hover{background:#002f6c;}
</style>
</head>

<body>

<header>
<h1>🏏 Match Entry System</h1>
<p>Enter Match Performance</p>
</header>

<section>

<table>
<tr>
<th>Player</th>
<th>Matches</th>
<th>Runs</th>
<th>Balls</th>
<th>Dismissals</th>
<th>Strike Rate</th>
<th>Average</th>
</tr>

<tr>
<td>Barek Hussain</td>
<td><input type="number" class="matches" value="0"></td>
<td><input type="number" class="runs" value="0"></td>
<td><input type="number" class="balls" value="0"></td>
<td><input type="number" class="outs" value="0"></td>
<td class="sr">0</td>
<td class="avg">0</td>
</tr>

<tr>
<td>Jumon</td>
<td><input type="number" class="matches" value="0"></td>
<td><input type="number" class="runs" value="0"></td>
<td><input type="number" class="balls" value="0"></td>
<td><input type="number" class="outs" value="0"></td>
<td class="sr">0</td>
<td class="avg">0</td>
</tr>

<tr>
<td>Kopil</td>
<td><input type="number" class="matches" value="0"></td>
<td><input type="number" class="runs" value="0"></td>
<td><input type="number" class="balls" value="0"></td>
<td><input type="number" class="outs" value="0"></td>
<td class="sr">0</td>
<td class="avg">0</td>
</tr>

</table>

<button onclick="calculateStats()">Calculate Stats</button>

</section>

<script>

function calculateStats(){

const rows = document.querySelectorAll("table tr");

rows.forEach((row,index)=>{
if(index===0) return;

let runs = parseInt(row.querySelector(".runs").value) || 0;
let balls = parseInt(row.querySelector(".balls").value) || 0;
let outs = parseInt(row.querySelector(".outs").value) || 0;

let srCell = row.querySelector(".sr");
let avgCell = row.querySelector(".avg");

let strikeRate = balls>0 ? ((runs/balls)*100).toFixed(2) : 0;
let average = outs>0 ? (runs/outs).toFixed(2) : runs;

srCell.innerText = strikeRate;
avgCell.innerText = average;

});

}

</script>

</body>
</html>
